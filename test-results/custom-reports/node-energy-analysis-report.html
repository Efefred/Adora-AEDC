    body {
      margin: 0;

    header {
      background: linear-gradient(135deg, #7b1113, #1f2937);

      padding: 28px 40px;

    header h1 {

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));

    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);

    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 19px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #edf0f5;
      font-size: 15px;
    }

    .metric:last-child {
      border-bottom: none;
    }

    .metric strong {
      font-size: 18px;
    }

    footer {
      padding: 18px 40px;
      color: #6b7280;
      font-size: 13px;
    }
